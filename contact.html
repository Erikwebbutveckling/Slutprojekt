<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header>
      <div class="header-top">
        <img src="https://upload.wikimedia.org/wikipedia/en/f/fb/Miami_Heat_logo.svg" class="logo" alt="Miami heat logga">
        <h1>Miami Heat Fan Site</h1>
      </div>

      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="team.html">Team Roster</a></li>
          <li><a href="games.html">Games & Stats</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section>
        <h2>Fan Feedback</h2>

        <form class="contact-form">
          <input type="text" placeholder="Name" required>
          <input type="email" placeholder="Email">
          <input type="tel" placeholder="Phone">
          <input type="date">
          <input type="number" placeholder="Age">
          <input type="file">
          <input type="url" placeholder="Favorite team website">

          <select>
            <option>General feedback</option>
            <option>Report issue</option>
            <option>Fan message</option>
          </select>

          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox"> Subscribe to newsletter
            </label>

            <label>
              <input type="radio" name="fan"> Huge fan
            </label>
          </div>

          <label>How big of a fan are you?</label>
          <input type="range" min="0" max="100" value="50">

          <textarea placeholder="Message"></textarea>

          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Miami Heat Fan Site</p>
    </footer>
  </body>
</html>
